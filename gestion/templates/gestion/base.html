<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Proyecto - Gestion de Autores y Libros{% endblock %}</title>
    {% load static %}
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{% static 'gestion/css/style.css' %}" rel="stylesheet">
</head>
<body class="app-bg">
    <nav class="navbar navbar-expand-lg navbar-dark shadow-sm app-navbar">
        <div class="container">
            <a class="navbar-brand fw-semibold" href="{% url 'lista_autores' %}">Taller Biblioteca</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarPrincipal" aria-controls="navbarPrincipal" aria-expanded="false" aria-label="Mostrar navegacion">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarPrincipal">
                {% with url_name=request.resolver_match.url_name %}
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0 gap-lg-2">
                    <li class="nav-item">
                        <a class="nav-link {% if url_name == 'lista_autores' or url_name == 'crear_autor' or url_name == 'editar_autor' or url_name == 'eliminar_autor' %}active{% endif %}" href="{% url 'lista_autores' %}">Autores</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if url_name == 'lista_libros' or url_name == 'crear_libro' or url_name == 'editar_libro' or url_name == 'eliminar_libro' %}active{% endif %}" href="{% url 'lista_libros' %}">Libros</a>
                    </li>
                </ul>
                {% endwith %}
            </div>
        </div>
    </nav>

    <main class="container py-4 py-md-5">
        {% if messages %}
        <div class="mb-3">
            {% for message in messages %}
            <div class="alert alert-{{ message.tags|default:'info' }} alert-dismissible fade show shadow-sm" role="alert">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Cerrar"></button>
            </div>
            {% endfor %}
        </div>
        {% endif %}
        {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
