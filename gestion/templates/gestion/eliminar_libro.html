{% extends 'gestion/base.html' %}

{% block title %}Eliminar Libro{% endblock %}

{% block content %}
<h1 class="mb-3">Eliminar libro</h1>
<p>Confirma que deseas eliminar "{{ libro.titulo }}".</p>
<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Eliminar</button>
    <a href="{% url 'lista_libros' %}" class="btn btn-secondary">Cancelar</a>
</form>
{% endblock %}
