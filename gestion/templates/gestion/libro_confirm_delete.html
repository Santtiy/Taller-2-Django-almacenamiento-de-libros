{% extends 'gestion/base.html' %}

{% block title %}Eliminar Libro{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-7 col-xl-6">
        <div class="card border-danger shadow-sm">
            <div class="card-header bg-danger-subtle">
                <h1 class="h5 mb-0">Confirmar eliminacion</h1>
            </div>
            <div class="card-body">
                <p class="mb-4">Esta seguro de eliminar el libro <strong>{{ libro.titulo }}</strong>?</p>
                <form method="post" class="d-flex gap-2">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">Confirmar</button>
                    <a href="{% url 'lista_libros' %}" class="btn btn-outline-secondary">Cancelar</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
