{% extends 'gestion/base.html' %}

{% block title %}Eliminar Autor{% endblock %}

{% block content %}
<h1 class="mb-3">Eliminar autor</h1>
<p>Confirma que deseas eliminar a "{{ autor.nombre }}".</p>
<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Eliminar</button>
    <a href="{% url 'lista_autores' %}" class="btn btn-secondary">Cancelar</a>
</form>
{% endblock %}
